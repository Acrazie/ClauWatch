name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  swift-test:
    name: Swift Tests (macOS ${{ matrix.os }})
    runs-on: macos-${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [14, 15]
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'
      - uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ matrix.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ matrix.os }}-
      - run: swift build
      - run: swift test --parallel

  swift-release:
    name: Swift Release Build (macOS 15)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: .build
          key: spm-release-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-release-
      - run: swift build -c release

  bun:
    name: Bun Tests + Typecheck (macOS 15)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-
      - run: bun install
      - run: bun run typecheck
      - run: bun test hooks/
