name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  swift:
    name: Swift Tests (macOS ${{ matrix.os }})
    runs-on: macos-${{ matrix.os }}
    strategy:
      matrix:
        os: [14, 15]
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build (debug)
        run: swift build
      - name: Build (release)
        run: swift build -c release
      - name: Test
        run: swift test --parallel

  bun:
    name: Bun Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Test
        run: bun test hooks/
